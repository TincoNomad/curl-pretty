name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: curlp
            asset_name: curlp-linux-x64
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: curlp
            asset_name: curlp-linux-arm64
            use_cross: true   # ← cross maneja todo el entorno ARM64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: curlp
            asset_name: curlp-macos-x64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: curlp
            asset_name: curlp-macos-arm64
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: curlp.exe
            asset_name: curlp-windows-x64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install OpenSSL (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build with cross (ARM64)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (Unix native)
        if: matrix.use_cross == false && runner.os != 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (macOS)
        if: matrix.os == 'macos-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts
        run: |
          mkdir -p upload
          cp artifacts/curlp-linux-x64/curlp           upload/curlp-linux-x64       || true
          cp artifacts/curlp-linux-arm64/curlp          upload/curlp-linux-arm64     || true
          cp artifacts/curlp-macos-x64/curlp            upload/curlp-macos-x64       || true
          cp artifacts/curlp-macos-arm64/curlp          upload/curlp-macos-arm64     || true
          cp artifacts/curlp-windows-x64.exe/curlp.exe  upload/curlp-windows-x64.exe || true
          ls -la upload/

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            upload/curlp-linux-x64 \
            upload/curlp-linux-arm64 \
            upload/curlp-macos-x64 \
            upload/curlp-macos-arm64 \
            upload/curlp-windows-x64.exe \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}