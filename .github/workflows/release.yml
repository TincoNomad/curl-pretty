name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: curlp
            asset_name: curlp-linux-x64
            allow_failure: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: curlp
            asset_name: curlp-linux-arm64
            allow_failure: true  # Allow ARM64 to fail
          
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: curlp
            asset_name: curlp-macos-x64
            allow_failure: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: curlp
            asset_name: curlp-macos-arm64
            allow_failure: false
          
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: curlp.exe
            asset_name: curlp-windows-x64.exe
            allow_failure: false

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools (Linux ARM64)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config

    - name: Build target
      run: |
        cargo build --release --target ${{ matrix.target }}
      env:
        CC: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        PKG_CONFIG_ALLOW_CROSS: 1

    - name: Strip binary (Unix)
      if: matrix.os != 'windows-latest'
      run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/curlp-linux-x64/curlp
          artifacts/curlp-linux-arm64/curlp
          artifacts/curlp-macos-x64/curlp
          artifacts/curlp-macos-arm64/curlp
          artifacts/curlp-windows-x64.exe/curlp.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
